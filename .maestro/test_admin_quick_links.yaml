appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Admin Dashboard Quick Links
# Precondition: Admin is logged in and on Dashboard
# ═══════════════════════════════════════════════════════════

# ── Verify Dashboard loaded and reset scroll to top ──────
# tapOn active tab triggers useScrollToTop animation to top
- tapOn:
    text: "Dashboard"
# notification-bell is in header (always rendered) — visible only when at/near top
- extendedWaitUntil:
    visible:
      id: "notification-bell"
    timeout: 15000
- waitForAnimationToEnd

# ── Inspection Routines ──────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Inspection Routines"
    timeout: 12000
    visibilityPercentage: 50
- tapOn:
    text: "Inspection Routines"
- extendedWaitUntil:
    visible:
      id: "inspection-routines-screen"
    timeout: 10000
- assertVisible:
    id: "inspection-routines-screen"
- back
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 10000
# Reset scroll to top — wait for notification-bell to confirm animation done
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible:
      id: "notification-bell"
    timeout: 8000
- waitForAnimationToEnd

