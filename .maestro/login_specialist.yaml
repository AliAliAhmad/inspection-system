appId: com.inspection.system
---
# Force-stop + clear state to always start fresh at login screen
- stopApp:
    appId: "com.inspection.system"
- launchApp:
    appId: "com.inspection.system"
    clearState: true
    clearKeychain: false
# Handle Expo Dev Launcher — wait up to 8s for it to appear, then tap
- runFlow:
    file: tap_dev_launcher.yaml
    optional: true
# Dismiss Expo dev menu overlay if it appears after loading
- runFlow:
    file: dismiss_dev_menu.yaml
    optional: true
# Wait for login screen
- extendedWaitUntil:
    visible: "Sign in to your account"
    timeout: 120000
# Login as specialist
- tapOn:
    id: "login-email"
- tapOn:
    id: "login-email"
- eraseText: 50
- inputText: "ali.m.s"
- tapOn:
    id: "login-password"
- tapOn:
    id: "login-password"
- eraseText: 50
- inputText: "500340"
- tapOn: "Inspection System"
- hideKeyboard
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 30000
