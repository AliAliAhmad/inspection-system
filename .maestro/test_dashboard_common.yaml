appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Dashboard Navigation (All Roles)
# Precondition: User is logged in and on Dashboard
# ═══════════════════════════════════════════════════════════

# ── Verify Dashboard loaded ──────────────────────────────
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

# ── Tap Notification Bell → Notifications screen ────────
- tapOn:
    id: "notification-bell"
- extendedWaitUntil:
    visible: "Notifications"
    timeout: 10000
- back
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# ── Tap Quick Action: Defects → Defects screen ──────────
- tapOn:
    id: "quick-action-Defects"
- extendedWaitUntil:
    visible: "Defects"
    timeout: 10000
- back
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000

# ── Tap Quick Action: Team Chat → Channel List ──────────
- tapOn:
    id: "quick-action-ChannelList"
- extendedWaitUntil:
    visible: "Team Chat"
    timeout: 10000
- back
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
