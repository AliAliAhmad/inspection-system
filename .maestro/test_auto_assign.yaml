appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Auto-Assign Inspectors (Admin)
# Precondition: Logged in as admin, on Dashboard
# Requires: inspection list generated with unassigned items
# ═══════════════════════════════════════════════════════════

# ── Navigate to Inspection Assignments ───────────────────
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000
# Tap More again to scroll to top (More screen preserves scroll state)
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "more-assignments"
    timeout: 10000
    visibilityPercentage: 50
    direction: UP
- tapOn:
    id: "more-assignments"
- extendedWaitUntil:
    visible:
      id: "inspection-assignments-screen"
    timeout: 10000
- assertVisible:
    id: "inspection-assignments-screen"

# ── Tap Auto-Assign button ────────────────────────────────
- scrollUntilVisible:
    element:
      id: "inspection-auto-assign-btn"
    timeout: 5000
- tapOn:
    id: "inspection-auto-assign-btn"

# ── Wait for result (success or error alert) ──────────────
- extendedWaitUntil:
    visible:
      id: "inspection-assignments-screen"
    timeout: 15000
- assertVisible:
    id: "inspection-assignments-screen"

# ── Back to More screen ───────────────────────────────────
- back
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000

# ── Return to Dashboard ───────────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
