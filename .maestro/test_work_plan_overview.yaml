appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Work Plan Overview Tab (Admin / Engineer)
# Precondition: User (admin or engineer) is logged in
# ═══════════════════════════════════════════════════════════

# ── Verify Dashboard loaded ──────────────────────────────
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

# ── Tap "Work Planning" tab ──────────────────────────────
- tapOn:
    text: "Work Planning"
- extendedWaitUntil:
    visible: "Work Planning"
    timeout: 10000
- assertVisible:
    id: "work-plan-overview-screen"

# ── Return to Dashboard tab ──────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
