appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Quick Field Report FAB Action (All Roles)
# Precondition: Logged in, on Dashboard
# NOTE: FAB action items use testID fab-action-{id} after rebuild.
#       Until rebuild, this test verifies FAB menu shows Quick Report.
# ═══════════════════════════════════════════════════════════

# ── Ensure on Dashboard ────────────────────────────────────
# Navigate to Dashboard tab explicitly (handles post-handover re-render, notification toasts)
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 20000

# ── Open FAB menu ─────────────────────────────────────────
- tapOn:
    id: "fab-btn"
- extendedWaitUntil:
    visible: "Quick Report"
    timeout: 8000
- assertVisible:
    text: "Quick Report"

# ── Close menu (tap FAB again to toggle closed) ───────────
- tapOn:
    id: "fab-btn"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 5000
