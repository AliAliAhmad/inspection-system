appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Approve Leave Request (Admin)
# Precondition: Logged in as admin, on Dashboard
# Requires: at least one pending leave request in DB
# ═══════════════════════════════════════════════════════════

# ── Navigate to AdminMore tab ─────────────────────────────
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000

# ── Tap Leave Approvals ───────────────────────────────────
- tapOn:
    id: "more-leave-approvals"
- extendedWaitUntil:
    visible:
      id: "leave-approvals-screen"
    timeout: 10000
- assertVisible:
    id: "leave-approvals-screen"

# ── Try to find and approve first pending request ─────────
# NOTE: Test passes if screen loads — approve action requires data
- scrollUntilVisible:
    element:
      id: "leave-approvals-list"
    timeout: 5000

# ── Back to More screen ───────────────────────────────────
- back
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000

# ── Return to Dashboard ───────────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
