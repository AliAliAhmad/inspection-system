appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# MASTER TEST SUITE — All Roles E2E Tests
# Usage: maestro test .maestro/run_all_tests.yaml
# Roles: Inspector, Admin, Engineer, Specialist, QE, Test/Admin
# Total tests: ~69 (44 original + 25 new workflow tests)
#
# Legend: [shared] = same behavior across roles, run once
#         [data]   = requires specific DB data to pass
#         [nav]    = navigation/screen verification only
# ═══════════════════════════════════════════════════════════

# ── Launch app and handle Expo Dev Launcher if showing ─────
- launchApp
# If Expo Dev Launcher appears, tap the dev server to connect
- tapOn:
    text: "http://10.0.2.2:8081"
    optional: true
# login_inspector.yaml handles all startup states (dev menu, Dashboard, login screen)

# ═══════════════════════════════════════════════════════════
# ROLE 1: INSPECTOR (19 tests)
# Tests shared behaviors (FAB, chat send, notifications)
# + inspector-specific workflows (wizard, handover, report)
# ═══════════════════════════════════════════════════════════
- runFlow: login_inspector.yaml
- runFlow: test_dashboard.yaml
- runFlow: test_inspection_flow.yaml
- runFlow: test_assessment.yaml
- runFlow: test_notifications.yaml
- runFlow: test_defects.yaml
- runFlow: test_defect_detail.yaml
- runFlow: test_defect_filter.yaml              # [shared] new: filter chips
- runFlow: test_my_work_plan.yaml
- runFlow: test_chat.yaml
- runFlow: test_chat_room.yaml
- runFlow: test_chat_send_message.yaml          # [shared] new: send text message
- runFlow: test_notifications_mark_all_read.yaml  # [shared] new: mark all read button
- runFlow: test_create_handover.yaml            # new: shift handover form
# NOTE: test_unplanned_job requires rebuild — FAB context map updated in useFABContext.ts
# - runFlow: test_unplanned_job.yaml            # new: unplanned job via FAB [needs rebuild]
- runFlow: test_quick_field_report.yaml         # [shared] new: quick report via FAB
- runFlow: test_voice_msg_fab.yaml              # [shared] new: voice msg via FAB
# NOTE: test_inspection_wizard requires assigned inspection in DB for hazem.h.k
# - runFlow: test_inspection_wizard.yaml       # [data] new: wizard nav + answer
- runFlow: test_profile.yaml

