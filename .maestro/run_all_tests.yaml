- runFlow: test_admin_quick_links.yaml
- runFlow: test_admin_quick_links_extended.yaml
- runFlow: test_approve_leave.yaml              # [nav] new: leave approvals screen
- runFlow: test_approve_bonus.yaml              # [nav] new: bonus approvals screen
- runFlow: test_quality_validate.yaml           # [data] new: validate quality review
- runFlow: test_assign_inspection.yaml          # new: verify generate+auto-assign btns
- runFlow: test_generate_inspection_list.yaml   # new: generate inspection list modal
- runFlow: test_assign_defect.yaml              # [data] new: assign defect modal
- runFlow: test_auto_assign.yaml                # [data] new: auto-assign inspectors
- runFlow: test_chat.yaml
