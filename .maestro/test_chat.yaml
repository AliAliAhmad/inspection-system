appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Chat Navigation Flow (All Roles)
# Precondition: User is logged in
# ═══════════════════════════════════════════════════════════

# ── Tap Chat tab (available for all roles) ───────────────
- tapOn:
    text: "Chat"
- extendedWaitUntil:
    visible: "Team Chat"
    timeout: 15000
- assertVisible:
    id: "channel-list-screen"

# ── Return to Dashboard ─────────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
