appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Admin Quick Links — Extended
# Precondition: Admin logged in, on Dashboard
# Tests: Specialist Jobs, Engineer Jobs, Schedules,
#        Leave Approvals, Assignment Lists, Quality Reviews,
#        Monitor Follow-Ups
# ═══════════════════════════════════════════════════════════

- assertVisible:
    id: "dashboard-screen"

# ── Tap Dashboard tab again to scroll to top ─────────────
- tapOn:
    text: "Dashboard"
# notification-bell in header — visible once scroll animation finishes at top
- extendedWaitUntil:
    visible:
      id: "notification-bell"
    timeout: 10000
- waitForAnimationToEnd

# ── Specialist Jobs ──────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Specialist Jobs"
    timeout: 8000
    visibilityPercentage: 50
- tapOn:
    text: "Specialist Jobs"
- extendedWaitUntil:
    visible:
      id: "all-specialist-jobs-screen"
    timeout: 10000
- assertVisible:
    id: "all-specialist-jobs-screen"
- back
- extendedWaitUntil:
    visible:
      id: "dashboard-screen"
    timeout: 10000
# Reset scroll to top
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible:
      id: "notification-bell"
    timeout: 8000
- waitForAnimationToEnd

