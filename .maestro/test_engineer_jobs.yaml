appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Engineer Jobs Tab
# Precondition: User (engineer) is logged in and on Dashboard
# ═══════════════════════════════════════════════════════════

# ── Verify Dashboard loaded ──────────────────────────────
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

# ── Tap "My Jobs" tab ───────────────────────────────────
- tapOn:
    text: "My Jobs"
- extendedWaitUntil:
    visible: "My Jobs"
    timeout: 10000
- assertVisible:
    id: "engineer-jobs-screen"

# ── Return to Dashboard tab ──────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
