appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: QE Pending Reviews Tab
# Precondition: User (quality_engineer) is logged in
# ═══════════════════════════════════════════════════════════

# ── Verify Dashboard loaded ──────────────────────────────
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

# ── Tap "Pending Reviews" tab ────────────────────────────
- tapOn:
    text: "Pending Reviews"
- extendedWaitUntil:
    visible: "Pending Reviews"
    timeout: 10000
- assertVisible:
    id: "pending-reviews-screen"

# ── Return to Dashboard tab ──────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
