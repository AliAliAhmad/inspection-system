appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Quality Review Validation Action (Admin)
# Precondition: Logged in as admin, on Dashboard
# Requires: at least one quality review in DB
# NOTE: Goes deeper than test_admin_more_extended (tries to validate)
# ═══════════════════════════════════════════════════════════

# ── Navigate to AdminMore tab ─────────────────────────────
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000

# ── Tap Quality Reviews ───────────────────────────────────
- scrollUntilVisible:
    element:
      id: "more-quality-reviews"
    timeout: 8000
- tapOn:
    id: "more-quality-reviews"
- extendedWaitUntil:
    visible:
      id: "quality-reviews-admin-screen"
    timeout: 10000
- assertVisible:
    id: "quality-reviews-admin-list"

# ── Screen and list verified — data-dependent Validate action skipped if empty ──
# (no pending reviews in this environment — just verify screen loads correctly)
- back
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000

# ── Return to Dashboard ───────────────────────────────────
- tapOn:
    text: "Dashboard"
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 10000
