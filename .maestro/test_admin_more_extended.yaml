appId: com.inspection.system
---
# ═══════════════════════════════════════════════════════════
# TEST: Admin More Screen — Extended Navigation
# Precondition: Admin logged in, on Dashboard
# Uses testID selectors — works regardless of scroll position
# Tests: Daily Review, Overdue, Performance, Schedules,
#        Assignments, Specialist Jobs, Quality Reviews
# ═══════════════════════════════════════════════════════════

- assertVisible:
    text: "Dashboard"
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 10000
# Tap More again to reset scroll to top
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 5000

# ── Daily Review (scroll UP first — near top of list) ───
- scrollUntilVisible:
    element:
      id: "more-daily-review"
    direction: UP
    timeout: 12000
    visibilityPercentage: 50
- tapOn:
    id: "more-daily-review"
- extendedWaitUntil:
    visible:
      id: "daily-review-screen"
    timeout: 10000
- assertVisible:
    id: "daily-review-screen"
- back
- assertVisible:
    id: "admin-more-screen"
# Reset scroll to top before next item
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "admin-more-screen"
    timeout: 5000

# ── Overdue ──────────────────────────────────────────────
